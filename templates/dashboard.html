<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavioral Monitoring Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>Behavioral AI Monitoring Dashboard</h1>
            <p class="subtitle">Live Portal connected to PostgreSQL via FastAPI</p>
        </header>

        <main>
            <table id="alert-table">
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Violation Type</th>
                        <th>Timestamp</th>
                        <th>Evidence Screenshot</th>
                    </tr>
                </thead>
                <tbody id="alert-log-rows">
                    <!-- Logs will load here dynamically -->
                </tbody>
            </table>
        </main>
    </div>

    <!-- Image Modal (Pop-up Viewer) -->
    <div id="image-modal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modal-img">
        <div id="modal-caption"></div>
    </div>

    <script>
        // Adjust this port if Bilal's FastAPI uses something other than 8000
        const FASTAPI_URL = "http://127.0.0.1:8000/behavior-log/";

        async function fetchLatestLogs() {
            try {
                const response = await fetch(FASTAPI_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const logs = await response.json();
                updateDashboard(logs);
            } catch (error) {
                console.error("Error fetching live data from FastAPI:", error);
            }
        }

        function updateDashboard(logs) {
            const tableBody = document.getElementById("alert-log-rows");
            tableBody.innerHTML = ""; 

            logs.forEach(log => {
                const row = document.createElement("tr");

                // Format the Vision Engine's timestamp: "20260716_124135" -> "2026-07-16 12:41:35"
                const t = log.timestamp;
                let formattedTime = t;
                if (t && t.length >= 15) {
                    formattedTime = `${t.substring(0,4)}-${t.substring(4,6)}-${t.substring(6,8)} ${t.substring(9,11)}:${t.substring(11,13)}:${t.substring(13,15)}`;
                }

                // Route absolute image path through our Flask secure file server
                const safeImgSrc = `/local-evidence/${encodeURIComponent(log.evidence_path)}`;

                row.innerHTML = `
                    <td class="student-id"><strong>${log.student_id}</strong></td>
                    <td><span class="badge ${log.violation.toLowerCase()}">${log.violation.toUpperCase()}</span></td>
                    <td>${formattedTime}</td>
                    <td>
                        <button class="view-btn" onclick="openModal('${safeImgSrc}', '${log.student_id}')">
                            View Evidence
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function openModal(imageSrc, studentId) {
            const modal = document.getElementById("image-modal");
            const modalImg = document.getElementById("modal-img");
            const captionText = document.getElementById("modal-caption");
            
            modal.style.display = "block";
            modalImg.src = imageSrc;
            captionText.innerHTML = `Violation screenshot captured for: <strong>${studentId}</strong>`;
        }

        function closeModal() {
            document.getElementById("image-modal").style.display = "none";
        }

        // Close modal if user clicks outside of image frame
        window.onclick = function(event) {
            const modal = document.getElementById("image-modal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Auto-refresh the dashboard logs every 5 seconds
        setInterval(fetchLatestLogs, 5000);
        // Load logs immediately on page load
        fetchLatestLogs();
    </script>
</body>
</html>
